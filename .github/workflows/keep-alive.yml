name: Keep Website Alive

on:
  schedule:
    # Runs every 14 minutes to prevent the 15-minute idle sleep on free tiers
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  ping-website:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Six Jars App
        run: |
          echo "Pinging https://six-jars-app.smartinfralog.com to keep it alive..."
          curl -I -s https://six-jars-app.smartinfralog.com > /dev/null
          echo "Ping successful!"
